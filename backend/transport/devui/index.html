<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>UnoChess Dev UI</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: monospace; font-size: 13px; background: #1a1a2e; color: #e0e0e0; }
  h2 { font-size: 14px; text-transform: uppercase; letter-spacing: 1px; color: #a0a0c0; margin-bottom: 8px; }

  #setup { padding: 16px; border-bottom: 1px solid #333; display: flex; gap: 12px; align-items: flex-end; flex-wrap: wrap; }
  #setup label { display: flex; flex-direction: column; gap: 4px; font-size: 11px; color: #888; }
  #setup input, #setup select { background: #111; border: 1px solid #444; color: #e0e0e0; padding: 4px 8px; font-family: monospace; font-size: 13px; }
  button { background: #2e4d8a; border: none; color: #dde; padding: 6px 14px; cursor: pointer; font-family: monospace; font-size: 13px; }
  button:hover { background: #3a60a8; }
  button.danger { background: #6a1f1f; }
  button.danger:hover { background: #8a2929; }

  #panels { display: grid; grid-template-columns: 1fr 1fr; height: calc(100vh - 60px); }
  .panel { display: flex; flex-direction: column; border-right: 1px solid #333; }
  .panel:last-child { border-right: none; }
  .panel-header { background: #111; padding: 8px 12px; border-bottom: 1px solid #333; display: flex; gap: 8px; align-items: center; }
  .panel-header span.tag { padding: 2px 6px; font-size: 11px; }
  .tag.white { background: #ddd; color: #111; }
  .tag.black { background: #222; color: #ccc; border: 1px solid #555; }
  .tag.connected { background: #1a4a1a; color: #5f5; }
  .tag.disconnected { background: #4a1a1a; color: #f55; }

  .panel-body { display: flex; flex-direction: column; flex: 1; overflow: hidden; }
  .state-box { padding: 10px 12px; background: #13131f; border-bottom: 1px solid #2a2a3a; font-size: 12px; }
  .state-box .row { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 4px; }
  .kv { display: flex; gap: 6px; }
  .kv .k { color: #666; }
  .kv .v { color: #a0d0ff; }
  .kv .v.active { color: #5f5; font-weight: bold; }
  .kv .v.inactive { color: #888; }

  .hand { padding: 8px 12px; border-bottom: 1px solid #2a2a3a; display: flex; flex-wrap: wrap; gap: 6px; min-height: 40px; }
  .card { padding: 3px 7px; border-radius: 3px; cursor: pointer; border: 2px solid transparent; font-size: 12px; }
  .card:hover { opacity: 0.85; }
  .card.selected { border-color: #fff; }
  .card.RED    { background: #b22; color: #fff; }
  .card.BLUE   { background: #228; color: #fff; }
  .card.GREEN  { background: #282; color: #fff; }
  .card.YELLOW { background: #882; color: #fff; }
  .card.WILD   { background: linear-gradient(135deg, #b22 25%, #228 50%, #282 75%, #882 100%); color: #fff; }

  .cmd-area { padding: 8px 12px; border-bottom: 1px solid #2a2a3a; display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }
  .cmd-area select, .cmd-area input { background: #111; border: 1px solid #444; color: #e0e0e0; padding: 3px 6px; font-family: monospace; font-size: 12px; }

  .discard-pile { padding: 4px 12px; font-size: 11px; color: #888; border-bottom: 1px solid #2a2a3a; }
  .discard-top { display: inline-block; margin-left: 6px; padding: 2px 8px; border-radius: 3px; font-size: 12px; }

  .log { flex: 1; overflow-y: auto; padding: 8px 12px; }
  .log-entry { padding: 2px 0; border-bottom: 1px solid #1a1a2a; }
  .log-entry .ts { color: #555; margin-right: 6px; }
  .log-entry.sent .dir { color: #55f; }
  .log-entry.recv .dir { color: #5a5; }
  .log-entry.err  .dir { color: #f55; }
  .log-entry pre { display: inline; white-space: pre-wrap; word-break: break-all; }

  #fen-board { text-align: center; padding: 6px; font-size: 12px; color: #666; border-top: 1px solid #333; }
</style>
</head>
<body>

<div id="setup">
  <label>Server<input id="serverURL" value="http://localhost:8080" style="width:200px"></label>
  <button onclick="createHuman()">New Human Game</button>
  <button onclick="createBot()">New Bot Game</button>
  <label>Game ID<input id="joinGameID" style="width:260px" placeholder="paste game ID to join as Black"></label>
  <button onclick="joinGame()">Join as Black</button>
  <button class="danger" onclick="resetAll()">Reset</button>
</div>

<div id="panels">
  <div class="panel" id="panel-white">
    <div class="panel-header">
      <span class="tag white">White</span>
      <span id="ws-tag-white" class="tag disconnected">disconnected</span>
      <span id="game-id-white" style="color:#555;font-size:11px"></span>
    </div>
    <div class="panel-body">
      <div class="state-box" id="state-white">
        <div class="row">
          <div class="kv"><span class="k">phase</span><span class="v" id="phase-white">—</span></div>
          <div class="kv"><span class="k">active</span><span class="v" id="active-white">—</span></div>
          <div class="kv"><span class="k">draw pile</span><span class="v" id="draw-white">—</span></div>
          <div class="kv"><span class="k">opp hand</span><span class="v" id="opp-white">—</span></div>
        </div>
      </div>
      <div class="discard-pile">Discard top: <span class="discard-top card" id="discard-white">—</span></div>
      <div class="hand" id="hand-white"></div>
      <div class="cmd-area">
        <button onclick="sendDraw('white')">Draw for Turn</button>
        <button onclick="sendPlaySelected('white')">Play Selected</button>
        Declared:
        <select id="declared-white">
          <option value="">—</option>
          <option value="RED">Red</option>
          <option value="BLUE">Blue</option>
          <option value="GREEN">Green</option>
          <option value="YELLOW">Yellow</option>
        </select>
        UCI: <input id="uci-white" style="width:80px" placeholder="e2e4">
        <button onclick="sendSubMove('white')">Sub-move</button>
      </div>
      <div class="log" id="log-white"></div>
    </div>
  </div>

  <div class="panel" id="panel-black">
    <div class="panel-header">
      <span class="tag black">Black</span>
      <span id="ws-tag-black" class="tag disconnected">disconnected</span>
      <span id="game-id-black" style="color:#555;font-size:11px"></span>
    </div>
    <div class="panel-body">
      <div class="state-box" id="state-black">
        <div class="row">
          <div class="kv"><span class="k">phase</span><span class="v" id="phase-black">—</span></div>
          <div class="kv"><span class="k">active</span><span class="v" id="active-black">—</span></div>
          <div class="kv"><span class="k">draw pile</span><span class="v" id="draw-black">—</span></div>
          <div class="kv"><span class="k">opp hand</span><span class="v" id="opp-black">—</span></div>
        </div>
      </div>
      <div class="discard-pile">Discard top: <span class="discard-top card" id="discard-black">—</span></div>
      <div class="hand" id="hand-black"></div>
      <div class="cmd-area">
        <button onclick="sendDraw('black')">Draw for Turn</button>
        <button onclick="sendPlaySelected('black')">Play Selected</button>
        Declared:
        <select id="declared-black">
          <option value="">—</option>
          <option value="RED">Red</option>
          <option value="BLUE">Blue</option>
          <option value="GREEN">Green</option>
          <option value="YELLOW">Yellow</option>
        </select>
        UCI: <input id="uci-black" style="width:80px" placeholder="e7e5">
        <button onclick="sendSubMove('black')">Sub-move</button>
      </div>
      <div class="log" id="log-black"></div>
    </div>
  </div>
</div>

<script>
const state = {
  white: { ws: null, selected: null, token: null, gameID: null },
  black: { ws: null, selected: null, token: null, gameID: null },
};

function server() { return document.getElementById('serverURL').value.replace(/\/$/, ''); }
function wsBase() { return server().replace(/^http/, 'ws'); }

async function apiFetch(path, method = 'GET', body = null) {
  const opts = { method, headers: { 'Content-Type': 'application/json' } };
  if (body) opts.body = JSON.stringify(body);
  const r = await fetch(server() + path, opts);
  const text = await r.text();
  try { return { ok: r.ok, status: r.status, data: JSON.parse(text) }; }
  catch { return { ok: r.ok, status: r.status, data: text }; }
}

async function createHuman() {
  const r = await apiFetch('/games', 'POST', { opponent: 'human' });
  if (!r.ok) { alert('Create failed: ' + JSON.stringify(r.data)); return; }
  const { gameID, playerToken } = r.data;
  state.white.token = playerToken;
  state.white.gameID = gameID;
  document.getElementById('game-id-white').textContent = gameID;
  document.getElementById('joinGameID').value = gameID;
  connectWS('white', gameID, playerToken);
  appendLog('white', 'info', `Created game ${gameID} — share ID with Black player`);
}

async function createBot() {
  const r = await apiFetch('/games', 'POST', { opponent: 'bot' });
  if (!r.ok) { alert('Create failed: ' + JSON.stringify(r.data)); return; }
  const { gameID, playerToken } = r.data;
  state.white.token = playerToken;
  state.white.gameID = gameID;
  document.getElementById('game-id-white').textContent = gameID + ' (bot)';
  connectWS('white', gameID, playerToken);
  appendLog('white', 'info', `Created bot game ${gameID}`);
}

async function joinGame() {
  const gameID = document.getElementById('joinGameID').value.trim();
  if (!gameID) { alert('Paste a game ID first'); return; }
  const r = await apiFetch('/games/' + gameID + '/join', 'POST', {});
  if (!r.ok) { alert('Join failed: ' + JSON.stringify(r.data)); return; }
  const { playerToken } = r.data;
  state.black.token = playerToken;
  state.black.gameID = gameID;
  document.getElementById('game-id-black').textContent = gameID;
  connectWS('black', gameID, playerToken);
  appendLog('black', 'info', `Joined game ${gameID} as Black`);
}

function connectWS(side, gameID, token) {
  const ws = new WebSocket(`${wsBase()}/games/${gameID}/play?token=${token}`);
  state[side].ws = ws;

  ws.onopen = () => {
    document.getElementById('ws-tag-' + side).textContent = 'connected';
    document.getElementById('ws-tag-' + side).className = 'tag connected';
  };
  ws.onclose = () => {
    document.getElementById('ws-tag-' + side).textContent = 'disconnected';
    document.getElementById('ws-tag-' + side).className = 'tag disconnected';
  };
  ws.onerror = (e) => appendLog(side, 'err', 'WS error: ' + e.message);
  ws.onmessage = (e) => {
    const msg = JSON.parse(e.data);
    appendLog(side, 'recv', JSON.stringify(msg, null, 2));
    if (msg.type === 'state') applyState(side, msg);
    if (msg.type === 'game_over') applyGameOver(side, msg);
  };
}

function applyState(side, msg) {
  document.getElementById('phase-' + side).textContent = msg.phase || '—';
  const isActive = msg.yourColor === msg.activeColor;
  const activeEl = document.getElementById('active-' + side);
  activeEl.textContent = msg.activeColor || '—';
  activeEl.className = 'v ' + (isActive ? 'active' : 'inactive');
  document.getElementById('draw-' + side).textContent = msg.drawPileSize ?? '—';
  document.getElementById('opp-' + side).textContent = msg.opponentHandCount ?? '—';

  // Discard top
  const discardEl = document.getElementById('discard-' + side);
  if (msg.discardTop && msg.discardTop.value) {
    discardEl.textContent = `${msg.discardTop.value} ${msg.discardTop.color}`;
    discardEl.className = `discard-top card ${msg.discardTop.color}`;
  }

  // Hand
  const handEl = document.getElementById('hand-' + side);
  handEl.innerHTML = '';
  state[side].selected = null;
  (msg.yourHand || []).forEach(card => {
    const el = document.createElement('span');
    el.className = `card ${card.color}`;
    el.textContent = `${card.value} ${card.color}`;
    el.dataset.value = card.value;
    el.dataset.color = card.color;
    el.onclick = () => selectCard(side, el, card);
    handEl.appendChild(el);
  });
}

function applyGameOver(side, msg) {
  appendLog(side, 'info', `🏁 Game over! Winner: ${msg.winner} | Reason: ${msg.reason} | Turns: ${msg.turns}`);
}

function selectCard(side, el, card) {
  // Deselect all cards on this side.
  document.querySelectorAll(`#hand-${side} .card`).forEach(c => c.classList.remove('selected'));
  if (state[side].selected && state[side].selected.value === card.value && state[side].selected.color === card.color) {
    state[side].selected = null;
  } else {
    el.classList.add('selected');
    state[side].selected = card;
  }
}

function sendDraw(side) {
  send(side, { type: 'draw_for_turn' });
}

function sendPlaySelected(side) {
  const card = state[side].selected;
  if (!card) { appendLog(side, 'err', 'No card selected'); return; }
  const declared = document.getElementById('declared-' + side).value;
  const cmd = { type: 'play_card', card };
  if (declared) cmd.declaredColor = declared;
  send(side, cmd);
}

function sendSubMove(side) {
  const uci = document.getElementById('uci-' + side).value.trim();
  if (!uci) { appendLog(side, 'err', 'No UCI move entered'); return; }
  send(side, { type: 'play_sub_move', uci });
}

function send(side, msg) {
  const ws = state[side].ws;
  if (!ws || ws.readyState !== WebSocket.OPEN) {
    appendLog(side, 'err', 'Not connected'); return;
  }
  const raw = JSON.stringify(msg);
  ws.send(raw);
  appendLog(side, 'sent', raw);
}

function appendLog(side, dir, text) {
  const log = document.getElementById('log-' + side);
  const ts = new Date().toISOString().slice(11, 23);
  const entry = document.createElement('div');
  entry.className = `log-entry ${dir}`;
  const arrow = dir === 'sent' ? '→' : dir === 'recv' ? '←' : '•';
  entry.innerHTML = `<span class="ts">${ts}</span><span class="dir">${arrow}</span> <pre>${escHtml(text)}</pre>`;
  log.appendChild(entry);
  log.scrollTop = log.scrollHeight;
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function resetAll() {
  ['white', 'black'].forEach(side => {
    if (state[side].ws) state[side].ws.close();
    state[side] = { ws: null, selected: null, token: null, gameID: null };
    document.getElementById('log-' + side).innerHTML = '';
    document.getElementById('hand-' + side).innerHTML = '';
    document.getElementById('phase-' + side).textContent = '—';
    document.getElementById('active-' + side).textContent = '—';
    document.getElementById('draw-' + side).textContent = '—';
    document.getElementById('opp-' + side).textContent = '—';
    document.getElementById('discard-' + side).textContent = '—';
    document.getElementById('discard-' + side).className = 'discard-top card';
    document.getElementById('ws-tag-' + side).textContent = 'disconnected';
    document.getElementById('ws-tag-' + side).className = 'tag disconnected';
    document.getElementById('game-id-' + side).textContent = '';
  });
}
</script>
</body>
</html>
